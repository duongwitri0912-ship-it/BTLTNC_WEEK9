name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build on ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Lấy mã nguồn (Checkout)
        uses: actions/checkout@v4

      - name: Thiết lập Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Chạy Unit Tests và Kiểm tra Độ bao phủ (Verify)
        run: mvn -B clean verify --file pom.xml

      - name: Tải lên tệp .jar (Artifact)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GradeClassifier-Build-Artifact-${{ matrix.os }}
          path: target/*.jar

      - name: Tải lên Báo cáo JaCoCo (Coverage Report)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report-${{ matrix.os }}
          path: target/site/jacoco/
