# Tên của workflow hiển thị trên tab Actions của GitHub
name: Java CI với Maven và GitHub Actions

# 1. YÊU CẦU: Kích hoạt (trigger) khi có sự kiện push và pull_request
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    # Chạy trên môi trường Ubuntu mới nhất
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Kiểm tra mã nguồn (Checkout) để lấy code từ repo về máy ảo của GitHub
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      # Bước 2: Thiết lập môi trường Java (JDK 17)
      - name: Thiết lập JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Tự động cache các thư viện Maven để lần build sau nhanh hơn (Professional)
          cache: maven

      # Bước 3: YÊU CẦU: Thực thi vòng đời build của Maven (Pha test và package)
      # Lệnh 'mvn package' sẽ tự động kích hoạt 'mvn test' trước đó.
      # Nếu Unit Test thất bại, quy trình sẽ dừng lại và báo lỗi đỏ.
      - name: Chạy Unit Tests và Đóng gói (Package)
        run: mvn -B clean package --file pom.xml

      # Bước 4: YÊU CẦU: Triển khai action upload-artifact để lưu giữ tệp .jar
      # File .jar sau khi tạo ra sẽ nằm trong thư mục target/
      - name: Tải lên tệp .jar (Artifact)
        if: success() # Chỉ chạy nếu các bước trên (bao gồm cả test) thành công
        uses: actions/upload-artifact@v4
        with:
          name: GradeClassifier-Build-Artifact
          path: target/*.jar
          # File sẽ được lưu giữ trên GitHub trong 5 ngày (có thể tùy chỉnh)
          retention-days: 5

      # Bước bổ sung: Xuất thông báo khi build thành công
      - name: Thông báo hoàn tất
        run: echo "Quy trình CI đã thực hiện thành công pha test và package."cd ..
